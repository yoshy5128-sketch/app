name: Update BGM tracklist

on:
  push:
    paths:
      - "gfa/bgm/**.mp3"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate tracklist.json
        run: |
          python - <<'PY'
          import json, pathlib
          bgm_dir = pathlib.Path("gfa/bgm")
          tracks = [f"bgm/{p.name}" for p in sorted(bgm_dir.glob("*.mp3"))]
          bgm_dir.mkdir(parents=True, exist_ok=True)
          (bgm_dir / "tracklist.json").write_text(json.dumps(tracks, ensure_ascii=False, indent=2))
          PY
      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes"
          else
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git add bgm/tracklist.json
            git commit -m "Update bgm tracklist"
            git push
          fi

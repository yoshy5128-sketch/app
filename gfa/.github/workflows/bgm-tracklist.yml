name: Update BGM tracklist

on:
  push:
    paths:
      - "bgm/**.mp3"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate tracklist.json
        run: |
          ls bgm/*.mp3 2>/dev/null | sed 's|^|bgm/|; s|^bgm/bgm/|bgm/|' | sort > /tmp/list.txt
          python - <<'PY'
          import json, pathlib
          lst = pathlib.Path("/tmp/list.txt").read_text().splitlines()
          pathlib.Path("bgm/tracklist.json").write_text(json.dumps(lst, ensure_ascii=False, indent=2))
          PY
      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes"
          else
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git add bgm/tracklist.json
            git commit -m "Update bgm tracklist"
            git push
          fi
